name: Update results

# Pulls finished-match results from ESPN and commits them to data.json.
# Runs on GitHub's infra (always awake) and pushes to this repo via the
# built-in GITHUB_TOKEN - no external credentials needed.

on:
  # Scheduling is handled by the k3s CronJob (results-updater) which fires
  # reliably every 15 min. This workflow stays as a manual fallback only.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "results-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch finished results and commit
        run: python3 update_results.py
